<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PCB Viewer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #0d0d0f; }
    #root { width: 100%; height: 100%; }
    #loading {
      position: fixed; inset: 0;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      background: #0d0d0f; color: #71717a;
      font-family: system-ui, sans-serif; font-size: 13px; gap: 12px;
      z-index: 100;
    }
    .spinner {
      width: 24px; height: 24px;
      border: 2px solid #27272a;
      border-top-color: #3b82f6;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="loading">
    <div class="spinner"></div>
    <span>Loading PCB viewer…</span>
  </div>
  <div id="root"></div>

  <script>
    // Fetch circuit JSON, expose it as window.CIRCUIT_JSON (what the standalone bundle reads),
    // then load the self-contained preview bundle which mounts into #root automatically.
    fetch('/pcb/circuit.json')
      .then(function(r) { return r.json(); })
      .then(function(circuitJson) {
        window.CIRCUIT_JSON = circuitJson;

        // Read the ?tab= query param to determine which tab to open
        var tab = (new URLSearchParams(window.location.search)).get('tab') || 'pcb';

        window.CIRCUIT_JSON_PREVIEW_PROPS = {
          showCodeTab: false,
          showJsonTab: false,
          defaultActiveTab: tab,
          defaultTab: tab,
          availableTabs: ['pcb', 'schematic', 'cad'],
        };

        var s = document.createElement('script');
        s.src = '/pcb/runframe-standalone-preview.min.js';
        s.onload = function() {
          var el = document.getElementById('loading');
          if (el) el.style.display = 'none';
        };
        s.onerror = function() {
          document.getElementById('loading').innerHTML =
            '<span style="color:#ef4444">Failed to load viewer bundle.</span>';
        };
        document.body.appendChild(s);
      })
      .catch(function(e) {
        document.getElementById('loading').innerHTML =
          '<span style="color:#ef4444">Failed to load circuit data: ' + e.message + '</span>';
      });
  </script>
</body>
</html>
